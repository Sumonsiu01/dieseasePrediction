<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiseasePredict Pro | Smart Health</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');

    html { scroll-behavior: smooth; }

    body {
      background: linear-gradient(270deg, #0f172a, #1e3a8a, #3b82f6, #6366f1);
      background-size: 600% 600%;
      animation: gradientBG 15s ease infinite;
      color: white;
      transition: all 0.5s ease;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    @keyframes gradientBG {
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    body.dark-mode { background: #000 !important; }

    .glass {
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .gradient-text {
      background: linear-gradient(to right, #60a5fa, #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .animate-modal {
      animation: fadeInUp 0.4s ease forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(25px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
  </style>
</head>

<body class="min-h-screen">

<!-- NAVBAR -->
<nav class="glass fixed w-full z-50">
  <div class="container mx-auto px-6 py-4 flex justify-between items-center">

    <div class="text-2xl font-black gradient-text">DiseasePredict</div>

    <div class="flex items-center space-x-6">

      <a href="#" class="hover:text-blue-300">Home</a>
      <a href="{% url 'patient_home' %}" class="hover:text-blue-300">Dashboard</a>

      {% if user.is_authenticated %}
      <button onclick="toggleModal()" class="flex items-center">
        <img src="https://ui-avatars.com/api/?name={{ user.username }}&background=4f46e5&color=fff"
             class="w-10 h-10 rounded-full border">
      </button>
      {% else %}
      <a href="{% url 'login' %}" class="px-4 py-2 bg-blue-600 rounded-lg">Login</a>
      {% endif %}

      <button id="themeToggle" class="bg-white/10 px-3 py-2 rounded-xl">🌙</button>
    </div>

  </div>
</nav>

<!-- HERO -->
<section class="min-h-screen flex flex-col justify-center items-center text-center px-6 pt-20">
  <h1 class="text-6xl font-black">
    <span class="gradient-text">AI Health Tech</span>
  </h1>

  <p class="text-gray-300 mt-6 max-w-xl">
    Analyze symptoms instantly with AI.
  </p>

  <button onclick="toggleModal()" class="mt-10 px-10 py-4 bg-indigo-600 rounded-2xl">
    Open Smart Card
  </button>
</section>

<!-- MODAL -->
<div id="profileModal" class="fixed inset-0 hidden items-center justify-center bg-black/70 z-[100]">

  <div class="glass w-[350px] rounded-3xl p-6 animate-modal relative">

    <button onclick="toggleModal()" class="absolute top-3 right-3 text-white">✖</button>

    <div class="text-center">
      <img src="https://ui-avatars.com/api/?name={{ user.username }}"
           class="w-24 h-24 mx-auto rounded-full border">
      <h2 class="mt-3 text-xl font-bold">{{ user.username }}</h2>
    </div>

    <div class="mt-6 space-y-3">

      <a href="{% url 'patient_home' %}" class="block p-3 bg-blue-600 rounded-lg text-center">
        Patient Dashboard
      </a>

      <form method="POST" action="{% url 'logout' %}">
        {% csrf_token %}
        <button class="w-full p-3 bg-red-500 rounded-lg">
          Logout
        </button>
      </form>

    </div>

  </div>

</div>

<!-- SCRIPT -->
<script>
  const toggleBtn = document.getElementById("themeToggle");

  toggleBtn.addEventListener("click", () => {
    document.body.classList.toggle("dark-mode");
  });

  function toggleModal() {
    const modal = document.getElementById("profileModal");

    if (modal.classList.contains("hidden")) {
      modal.classList.remove("hidden");
      modal.classList.add("flex");
      document.body.style.overflow = "hidden";
    } else {
      modal.classList.add("hidden");
      modal.classList.remove("flex");
      document.body.style.overflow = "auto";
    }
  }

  window.onclick = function(e) {
    const modal = document.getElementById("profileModal");
    if (e.target === modal) toggleModal();
  }
</script>

</body>
</html>
