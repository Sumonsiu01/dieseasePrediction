<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disease Prediction</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <style>
        html { scroll-behavior: smooth; }
        
        body {
            font-family: sans-serif;
            background: linear-gradient(270deg, #f3f4f6, #e0f2fe, #f3f4f6);
            background-size: 600% 600%;
            animation: bgMove 12s ease infinite;
        }

        @keyframes bgMove {
            0% {background-position:0% 50%;}
            50% {background-position:100% 50%;}
            100% {background-position:0% 50%;}
        }

        .glass {
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        .title-glow {
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Select2 Custom Styling to match glass UI */
        .select2-container--default .select2-selection--multiple {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            padding: 4px;
        }
    </style>
</head>

<body>

<nav class="fixed top-0 left-0 w-full z-50 backdrop-blur-xl bg-white/80 border-b border-gray-200">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
        
        <div class="text-xl font-extrabold title-glow">
            DiseasePredict
        </div>

        <div class="hidden md:flex gap-6 text-sm font-medium text-gray-700">
            <a href="{% url 'home' %}" class="hover:text-blue-500 transition">Home</a>
            {% if user.is_authenticated %}
            <a href="{% url 'patient_home' %}" class="hover:text-blue-500 font-bold">Dashboard</a>
            {% endif %}
        </div>

        <div class="flex items-center gap-4">
            {% if user.is_authenticated %}
            <a href="{% url 'patient_home' %}">
                <img src="https://ui-avatars.com/api/?name={{ user.username }}&background=4f46e5&color=fff" 
                     class="w-9 h-9 rounded-full border border-gray-200 shadow-sm">
            </a>
            {% endif %}
        </div>
    </div>
</nav>

<div class="max-w-4xl mx-auto mt-28 px-4 pb-10">

    <h1 class="text-4xl font-black mb-8 text-center title-glow animate-pulse">
        Analyze Your Symptoms 🧠
    </h1>

    <form method="POST" class="glass p-6 md:p-10 rounded-3xl shadow-2xl space-y-8 transform transition duration-500">
        {% csrf_token %}

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-500 uppercase tracking-widest ml-1">Age</label>
                <input name="age" type="number" placeholder="Enter age" required
                    class="w-full p-4 rounded-xl border border-gray-200 bg-white/50 focus:ring-4 focus:ring-blue-100 focus:border-blue-400 outline-none transition-all">
            </div>

            <div class="space-y-2">
                <label class="text-xs font-bold text-gray-500 uppercase tracking-widest ml-1">Gender</label>
                <select name="gender"
                    class="w-full p-4 rounded-xl border border-gray-200 bg-white/50 focus:ring-4 focus:ring-blue-100 focus:border-blue-400 outline-none transition-all">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>
        </div>

        <div class="space-y-2">
            <label class="text-xs font-bold text-gray-500 uppercase tracking-widest ml-1 block">
                Select Symptoms
            </label>
            <select name="symptoms[]" id="symptoms-select" multiple class="w-full">
                <option value="itching">Itching</option>
                <option value="skin_rash">Skin Rash</option>
                <option value="nodal_skin_eruptions">Nodal Skin Eruptions</option>
                <option value="continuous_sneezing">Continuous Sneezing</option>
                <option value="shivering">Shivering</option>
                <option value="chills">Chills</option>
                <option value="joint_pain">Joint Pain</option>
                <option value="stomach_pain">Stomach Pain</option>
                <option value="acidity">Acidity</option>
                <option value="ulcers_on_tongue">Ulcers on Tongue</option>
                <option value="muscle_wasting">Muscle Wasting</option>
                <option value="vomiting">Vomiting</option>
                </select>
        </div>

        <button type="submit" id="predictBtn"
            class="w-full bg-gradient-to-r from-indigo-600 to-blue-600 text-white py-5 rounded-2xl font-black text-lg shadow-xl hover:shadow-indigo-200 hover:scale-[1.02] active:scale-95 transition-all duration-300">
            Predict My Condition
        </button>

    </form>
    
    <p class="text-center text-gray-400 text-[10px] mt-8 uppercase tracking-widest">
        Powered by Machine Learning Engine v2.0
    </p>

</div>

<script>
    $(document).ready(function () {
        $('#symptoms-select').select2({
            placeholder: "🔍 Type or search symptoms...",
            width: '100%',
            allowClear: true
        });

        // Button Animation on Submit
        $('form').on('submit', function () {
            $('#predictBtn').html('<span class="flex items-center justify-center">Analyzing Data... <svg class="animate-spin ml-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg></span>');
            $('#predictBtn').addClass('opacity-80 pointer-events-none');
        });
    });
</script>

</body>
</html>
